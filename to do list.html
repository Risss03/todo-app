<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi To-Do List Real-Time</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .completed {
            text-decoration: line-through;
            color: #9ca3af;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-10 flex items-center justify-center">

    <div class="container max-w-lg mx-auto bg-white p-8 rounded-2xl shadow-xl">
        <h1 class="text-3xl font-extrabold text-gray-800 text-center mb-6">
            <i class="fa-solid fa-list-check text-indigo-600 mr-2"></i> To-Do List
        </h1>

        <div class="mb-6 text-center bg-indigo-50 p-3 rounded-lg border border-indigo-100">
            <span class="text-indigo-800 font-medium" id="real-time-clock">Memuat Waktu...</span>
        </div>

        <form id="todo-form" class="space-y-4 mb-8">
            <div>
                <label for="todo-title" class="block text-sm font-medium text-gray-700 mb-1">Judul Tugas</label>
                <input type="text" id="todo-title" required placeholder="Apa yang ingin kamu lakukan?" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="todo-date" class="block text-sm font-medium text-gray-700 mb-1">Tanggal</label>
                    <input type="date" id="todo-date" required 
                        class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>
                <div>
                    <label for="todo-time" class="block text-sm font-medium text-gray-700 mb-1">Waktu</label>
                    <input type="time" id="todo-time" required 
                        class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition shadow-md">
                <i class="fa-solid fa-plus mr-1"></i> Tambah Tugas
            </button>
        </form>

        <div>
            <h2 class="text-lg font-semibold text-gray-700 mb-4">Daftar Tugas Anda:</h2>
            <ul id="todo-list" class="space-y-3 max-h-[350px] overflow-y-auto pr-1">
                </ul>
        </div>
    </div>

    <script>
        // 1. Fungsi Waktu Real-Time
        function updateClock() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            };
            document.getElementById('real-time-clock').innerText = now.toLocaleDateString('id-ID', options);
        }
        setInterval(updateClock, 1000);
        updateClock(); // Panggil sekali saat dimuat

        // 2. Logika To-Do List
        const todoForm = document.getElementById('todo-form');
        const todoList = document.getElementById('todo-list');
        let todos = JSON.parse(localStorage.getItem('todos')) || [];

        function renderTodos() {
            todoList.innerHTML = '';

            if (todos.length === 0) {
                todoList.innerHTML = `<p class="text-center text-gray-400 py-6">Tidak ada tugas saat ini. Tambahkan tugas baru!</p>`;
                return;
            }

            todos.forEach((todo, index) => {
                const li = document.createElement('li');
                li.className = `flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-200 transition ${todo.completed ? 'opacity-75 bg-green-50/20' : ''}`;

                li.innerHTML = `
                    <div class="flex items-center gap-4 flex-1">
                        <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleComplete(${index})"
                            class="h-5 w-5 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                        
                        <div>
                            <span class="block font-medium ${todo.completed ? 'completed text-gray-500' : 'text-gray-800'}">
                                ${escapeHtml(todo.title)}
                            </span>
                            <span class="block text-xs text-gray-500 mt-0.5">
                                <i class="fa-regular fa-calendar mr-1"></i> ${todo.date} | 
                                <i class="fa-regular fa-clock mr-1"></i> ${todo.time}
                            </span>
                        </div>
                    </div>
                    <button onclick="deleteTodo(${index})" class="text-gray-400 hover:text-red-600 transition p-2">
                        <i class="fa-regular fa-trash-can"></i>
                    </button>
                `;

                todoList.appendChild(li);
            });
        }

        function toggleComplete(index) {
            todos[index].completed = !todos[index].completed;
            localStorage.setItem('todos', JSON.stringify(todos));
            renderTodos();
        }

        function deleteTodo(index) {
            todos.splice(index, 1);
            localStorage.setItem('todos', JSON.stringify(todos));
            renderTodos();
        }

        todoForm.addEventListener('submit', function (e) {
            e.preventDefault();

            const titleInput = document.getElementById('todo-title');
            const dateInput = document.getElementById('todo-date');
            const timeInput = document.getElementById('todo-time');

            const newTodo = {
                title: titleInput.value,
                date: dateInput.value,
                time: timeInput.value,
                completed: false
            };

            todos.push(newTodo);
            localStorage.setItem('todos', JSON.stringify(todos));
            renderTodos();

            // Reset form
            todoForm.reset();
        });

        // Fungsi keamanan untuk menghindari XSS
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Tampilkan data saat pertama kali dimuat
        renderTodos();
    </script>

</body>
</html>
